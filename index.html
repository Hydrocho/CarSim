<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 자동차 제동 거리 시뮬레이터 & 게임</title>
  <meta name="description" content="속도와 질량이 운동에너지와 제동 거리에 미치는 영향을 이해하는 3D 인터랙티브 교육용 시뮬레이션 게임입니다.">
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Outfit, Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- 메인 글래스 UI 오버레이 -->
  <div class="ui-wrapper">

    <!-- 왼쪽 설정 패널 -->
    <section class="control-panel panel">
      <h2>시뮬레이션 설정</h2>

      <!-- 질량 조절 -->
      <div class="control-group">
        <div class="control-header">
          <label for="mass-input">차량 질량 (m)</label>
          <div class="value-input-wrapper">
            <input type="number" id="mass-input" min="1000" max="5000" step="1" value="1500">
            <span class="unit">kg</span>
          </div>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="mass-slider" min="1000" max="5000" step="1" value="1500">
          <div class="slider-ticks">
            <span>1,000kg (공차)</span>
            <span>5,000kg (최대)</span>
          </div>
        </div>
      </div>

      <!-- 속력 조절 -->
      <div class="control-group">
        <div class="control-header">
          <label for="speed-input">초기 속력 (v)</label>
          <div class="value-input-wrapper">
            <input type="number" id="speed-input" min="10" max="150" step="1" value="50">
            <span class="unit">km/h</span>
          </div>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="speed-slider" min="10" max="150" step="1" value="50">
          <div class="slider-ticks">
            <span>10 km/h</span>
            <span>150 km/h</span>
          </div>
        </div>
      </div>


      <!-- 제어 버튼들 -->
      <div class="action-buttons">
        <button id="btn-start" class="btn btn-primary" onclick="startSimulation()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          출발
        </button>
        <button id="btn-reset" class="btn btn-secondary" onclick="resetSimulation()" disabled>
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          초기화
        </button>
      </div>

      <button id="btn-new-target" class="btn btn-accent" onclick="generateNewChallenge()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        새로운 목표 생성
      </button>

      <div class="panel-divider"></div>

      <!-- 모니터링 섹션 통합 -->
      <div class="monitor-section">
        <!-- 상태 표시기 -->
        <div class="status-badge-container">
          <span id="status-badge" class="status-badge state-idle">대기 중</span>
        </div>

        <div class="metric-grid">
          <div class="metric-card energy-card">
            <span class="metric-label">계산된 차량 운동에너지</span>
            <div class="metric-value-container">
              <span id="energy-value" class="metric-value">96.5</span>
              <span class="metric-unit">kJ</span>
            </div>
            <div class="energy-bar-bg">
              <div id="energy-bar" class="energy-bar-fill" style="width: 25%;"></div>
            </div>
          </div>

          <div class="metric-card" id="target-distance-card">
            <span class="metric-label">목표 제동 거리</span>
            <div class="metric-value-container">
              <span id="target-distance-value" class="metric-value">---</span>
              <span class="metric-unit">m</span>
            </div>
          </div>

          <div class="metric-card">
            <span class="metric-label">실제 제동 거리</span>
            <div class="metric-value-container">
              <span id="actual-distance-value" class="metric-value">0.0</span>
              <span class="metric-unit">m</span>
            </div>
          </div>
        </div>

        <!-- 게임 결과 알림 -->
        <div id="result-box" class="result-box" style="display: none;">
          <h3 id="result-title">미션 완료!</h3>
          <p id="result-desc">목표와의 오차: 0.15m</p>
        </div>
      </div>
    </section>
  </div>

  <!-- 카메라 컨트롤 안내 토스트 -->
  <div id="view-instruction" class="view-instruction">
    화면을 드래그하여 3D 카메라 궤도를 변경할 수 있습니다.
  </div>

  <!-- 목표 거리 안내 팝업 모달 -->
  <div id="target-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button class="modal-close-x" onclick="closeTargetModal()" aria-label="닫기">&times;</button>
      <h2>🎯 이번 스테이지 목표</h2>
      <div class="modal-target-value">
        <span id="modal-target-dist">---</span><span class="modal-unit">m</span>
      </div>
      
      <div class="modal-hint-box">
        <span class="hint-title">💡 힌트</span>
        <p>차량 질량 <strong>500 kg</strong>, 초기 속력 <strong>20 km/h</strong> 일 때,<br>제동 거리는 <strong>1.00 m</strong> 입니다.</p>
      </div>
    </div>
  </div>

  <!-- 결과 안내 팝업 모달 -->
  <div id="result-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button class="modal-close-x" onclick="closeResultModal()" aria-label="닫기">&times;</button>
      <h2 id="modal-result-title">🏁 주행 결과</h2>
      
      <div class="result-metrics">
        <div class="metric-item">
          <span class="label">실제 제동 거리</span>
          <span class="value" id="modal-actual-dist">0.00m</span>
        </div>
        <div class="metric-item">
          <span class="label">목표 제동 거리</span>
          <span class="value" id="modal-target-dist-result">0.00m</span>
        </div>
      </div>
      
      <div id="modal-result-feedback" class="result-feedback-box">
        <!-- 결과 피드백 메세지 삽입 -->
      </div>
      
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeResultModal()">🔍 결과 둘러보기</button>
        <button class="btn btn-primary" onclick="resetSimulation()">🔄 다시 도전</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
